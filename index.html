<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R10 Academy — Dashboards (Trello)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', Helvetica, Arial, sans-serif;
            background: #07090F;
            color: #E8ECF5;
            min-height: 100vh;
        }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(110deg, #0020F8 0%, #00D0F8 100%);
            padding: 22px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fff;
        }
        .header-left { display: flex; align-items: center; gap: 18px; }
        .logo { font-weight: 900; font-size: 26px; letter-spacing: -0.5px; line-height: 1; }
        .logo span { color: #00E868; }
        .header-divider { width: 1px; height: 38px; background: rgba(255,255,255,0.35); }
        .header-title { font-size: 13px; line-height: 1.45; opacity: 0.95; }
        .header-title strong { display: block; font-size: 15px; font-weight: 700; }
        .header-badge {
            background: #F8E000; color: #0B1020; font-size: 10px; font-weight: 800;
            padding: 6px 13px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1.5px;
        }

        /* ── TABS ── */
        .tabs {
            background: #0B0E16;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 0 40px;
            display: flex;
            gap: 6px;
        }
        .tab {
            background: none; border: none; cursor: pointer;
            font-family: inherit; font-size: 13px; font-weight: 700;
            color: #8A93AD; padding: 16px 22px;
            border-bottom: 3px solid transparent;
            transition: color .15s ease, border-color .15s ease;
            display: flex; align-items: center; gap: 9px;
        }
        .tab small { font-weight: 600; font-size: 10px; opacity: 0.7; text-transform: uppercase; letter-spacing: .8px; }
        .tab:hover { color: #C7D0E0; }
        .tab.active { color: #fff; border-bottom-color: #00D0F8; }
        .tab .dot { width: 8px; height: 8px; border-radius: 50%; }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 40px; }

        .period-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
        .period-label { font-size: 12px; color: #8A93AD; text-transform: uppercase; letter-spacing: 1px; }
        .period-label strong { color: #fff; font-size: 14px; }
        .sample-tag {
            background: #F8E000; color: #0B1020; font-size: 11px; font-weight: 800;
            padding: 4px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* ── KPI CARDS ── */
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 30px; }
        .kpi-card {
            background: #11151F; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px;
            padding: 20px; border-top: 4px solid #00D0F8; box-shadow: 0 4px 18px rgba(0,0,0,0.4);
        }
        .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #8A93AD; margin-bottom: 10px; font-weight: 700; }
        .kpi-value { font-weight: 900; font-size: 32px; line-height: 1; color: #fff; }
        .kpi-sub { font-size: 11px; color: #6E7892; margin-top: 7px; font-weight: 600; }

        /* ── CHARTS ── */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-card { background: #11151F; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 24px; box-shadow: 0 4px 18px rgba(0,0,0,0.4); }
        .chart-card.full { grid-column: 1 / -1; }
        .chart-header { margin-bottom: 18px; }
        .chart-header.with-stat { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
        .chart-title { font-weight: 800; font-size: 14px; color: #fff; margin-bottom: 4px; }
        .chart-desc { font-size: 12px; color: #6E7892; font-weight: 600; }
        .chart-stat { text-align: right; flex-shrink: 0; }
        .chart-stat b { display: block; font-size: 30px; font-weight: 900; color: #E5484D; line-height: 1; }
        .chart-stat span { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #8A93AD; font-weight: 700; }
        .chart-wrapper { position: relative; height: 280px; }

        /* ── PLACEHOLDER ── */
        .placeholder {
            text-align: center; padding: 90px 20px; color: #6E7892;
            border: 1px dashed rgba(255,255,255,0.12); border-radius: 16px; background: #0C1019;
        }
        .placeholder h2 { color: #C7D0E0; font-size: 20px; margin-bottom: 10px; }
        .placeholder p { font-size: 13px; max-width: 440px; margin: 0 auto; line-height: 1.6; }

        .footer { text-align: center; padding: 26px 40px; font-size: 11px; color: #6E7892; border-top: 1px solid rgba(255,255,255,0.07); margin-top: 12px; }
        .footer strong { color: #00D0F8; font-weight: 800; }

        @media (max-width: 1100px) { .kpi-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) {
            .header { padding: 16px 20px; } .tabs { padding: 0 12px; overflow-x: auto; } .container { padding: 20px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="header-title">
            <strong style="font-size:20px;">Dashboard de Atendimento</strong>
        </div>
    </div>
    <div class="header-badge">Comercial</div>
</header>

<nav class="tabs" id="tabs">
    <button class="tab" data-key="r10"><span class="dot" style="background:#00D0F8"></span> R10 Academy <small>Pais · B2C</small></button>
    <button class="tab" data-key="escolas"><span class="dot" style="background:#00E868"></span> Escolas Bandeira Branca <small>Parcerias · B2B</small></button>
    <button class="tab" data-key="levon"><span class="dot" style="background:#8830E0"></span> Lévon Idiomas <small>Em breve</small></button>
</nav>

<div class="container" id="content"></div>

<footer class="footer">
    <strong>R10 Academy</strong> × Lévon Idiomas &nbsp;·&nbsp; CRM de atendimento no Trello &nbsp;·&nbsp; dados lidos dos boards via robô (Apps Script)
</footer>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG — uma planilha de dados, abas separadas por pipeline.
//  R10:     abas Funil / Escolinhas / Snapshots / Motivos
//  Escolas: abas Esc_Funil / Esc_Snapshots / Esc_Motivos
//  Tudo lido ao vivo via gviz (planilha pública). Sem dado vivo,
//  cai no demo embutido (foto real do board no momento em que foi montado).
// ══════════════════════════════════════════════════════════
// planilha de dados do R10 ("R10 Academy - Dashboard Funil (dados)")
const SHEET_ID = '1zxnh6sFjN7MMNdA2yZ5-Bx67Fmc1UVLMmltGitFc3vQ';
const gviz = q => `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&${q}`;
// planilha de dados das ESCOLAS ("Escolas Bandeira Branca - Dashboard Funil (dados)")
const SHEET_ID_ESC = '1-P_AN0EpSK-22pSPaxWUxeK9ADJ6keNPIF5fEVOMjTw';
const gvizEsc = q => `https://docs.google.com/spreadsheets/d/${SHEET_ID_ESC}/gviz/tq?tqx=out:csv&${q}`;

const C = { cyan:'#00D0F8', verde:'#00E868', azul:'#0020F8', amarelo:'#F8E000', vermelho:'#E5484D', cinza:'#C7D0E0', roxo:'#8830E0', laranja:'#FF8D00' };
const FUNIL_CORES   = ['#0020F8','#1E6BF5','#00A8E8','#00D0F8','#00DCB0','#00E89A','#00E868'];
const ESCOLA_CORES  = ['#00D0F8','#00E868','#F8E000','#8830E0','#0020F8','#E5484D'];
// cor por etapa do funil de ESCOLAS (cada etapa distinta; Fechamentos em vermelho)
const ESC_FUNIL_COR = {
  'Leads Novos'      : '#0020F8',  // azul
  'Contato Indicado' : '#8830E0',  // roxo
  'Aquecimento'      : '#00D0F8',  // cyan
  'Agendamentos'     : '#F8E000',  // amarelo
  'Negociação'       : '#FF8D00',  // laranja
  'Fechamentos'      : '#00E868',  // verde (ganho)
};
const MOTIVO_CORES  = ['#E5484D','#FF8D00','#F8E000','#8830E0','#00D0F8','#6E7892'];

if (window.Chart) { Chart.defaults.color = '#AEB6C9'; }
const fmt = n => (n === null || n === undefined || isNaN(n)) ? '—' : String(n);
const pct = (a, b) => (!b || b === 0) ? 0 : Math.round((a / b) * 100);
const num = v => parseInt(v) || 0;
const baseFont = { family: "'Montserrat', Helvetica, Arial, sans-serif", size: 12 };
const gridColor = 'rgba(255,255,255,0.07)';
let charts = {};

// ── DEMO R10 (pais) — foto 22/06 ─────────────────────────
const DEMO_R10 = {
  funil: [
    { Ordem:'1', Etapa:'Lead Novo',           Grupo:'Entrada', Total:'10', Planilha:'6', Trafego:'4' },
    { Ordem:'2', Etapa:'1º Contato Enviado',  Grupo:'Ativo',   Total:'8',  Planilha:'6', Trafego:'2' },
    { Ordem:'3', Etapa:'2º Contato Enviado',  Grupo:'Ativo',   Total:'6',  Planilha:'4', Trafego:'2' },
    { Ordem:'4', Etapa:'Em Conversa',         Grupo:'Ativo',   Total:'5',  Planilha:'4', Trafego:'1' },
    { Ordem:'5', Etapa:'Call Agendada',       Grupo:'Ativo',   Total:'4',  Planilha:'3', Trafego:'1' },
    { Ordem:'6', Etapa:'Call Realizada',      Grupo:'Ativo',   Total:'3',  Planilha:'2', Trafego:'1' },
    { Ordem:'7', Etapa:'Matriculado',         Grupo:'Ganho',   Total:'3',  Planilha:'2', Trafego:'1' },
    { Ordem:'8', Etapa:'Sem Interesse',       Grupo:'Perdido', Total:'4',  Planilha:'3', Trafego:'1' },
    { Ordem:'9', Etapa:'Sem Resposta - Frio', Grupo:'Perdido', Total:'7',  Planilha:'5', Trafego:'2' },
  ],
  escolinhas: [ { Escolinha:'Craques FC', Total:'13' }, { Escolinha:'Bola na Rede', Total:'12' }, { Escolinha:'Gol de Placa', Total:'10' } ],
  snapshots:  [ { Data:'2026-06-22', Total:'50', Matriculados:'3', Perdidos:'11', EmAndamento:'36', Planilha:'35', Trafego:'15' } ],
  motivos:    [ { Motivo:'Preco', Total:'1' }, { Motivo:'Já faz inglês', Total:'1' }, { Motivo:'Não viu valor', Total:'1' }, { Motivo:'Outro', Total:'1' } ],
};

// ── DEMO ESCOLAS (parcerias) — foto real 24/06 ───────────
const DEMO_ESC = {
  funil: [
    { Ordem:'1', Etapa:'Leads Novos',      Grupo:'Entrada', Total:'23' },
    { Ordem:'2', Etapa:'Contato Indicado', Grupo:'Ativo',   Total:'0'  },
    { Ordem:'3', Etapa:'Aquecimento',      Grupo:'Ativo',   Total:'1'  },
    { Ordem:'4', Etapa:'Agendamentos',     Grupo:'Ativo',   Total:'2'  },
    { Ordem:'5', Etapa:'Negociação',       Grupo:'Ativo',   Total:'0'  },
    { Ordem:'6', Etapa:'Fechamentos',      Grupo:'Ganho',   Total:'1'  },
    { Ordem:'7', Etapa:'Sem Interesse',    Grupo:'Perdido', Total:'4'  },
  ],
  snapshots: [ { Data:'2026-06-24', Total:'31', Fechadas:'1', Perdidas:'4', EmAndamento:'26' } ],
  motivos:   [
    { Motivo:'Já tem inglês/parceiro', Total:'1' },
    { Motivo:'Não quis fornecer lista dos pais', Total:'1' },
    { Motivo:'Não viu valor/modelo', Total:'1' },
    { Motivo:'Outro', Total:'1' },
  ],
};

// ── PIPELINES ────────────────────────────────────────────
const PIPELINES = {
  r10: {
    label: 'R10 Academy', sub: 'Funil de atendimento aos pais · CRM Trello',
    sources: {
      funil:      { url: gviz('gid=610213254'),    cols:['Ordem','Etapa','Grupo','Total','Planilha','Trafego'], demo: DEMO_R10.funil, valid: rows => rows.some(r => /^\d+$/.test(String(r.Ordem||'').trim())) },
      escolinhas: { url: gviz('sheet=Escolinhas'),  cols:['Escolinha','Total'],                                  demo: DEMO_R10.escolinhas },
      snapshots:  { url: gviz('sheet=Snapshots'),   cols:['Data','Total','Matriculados','Perdidos'],             demo: DEMO_R10.snapshots },
      motivos:    { url: gviz('sheet=Motivos'),     cols:['Motivo','Total'],                                     demo: DEMO_R10.motivos },
    },
    render: renderR10,
  },
  escolas: {
    label: 'Escolas Bandeira Branca', sub: 'Funil de parcerias com escolinhas · CRM Trello',
    sources: {
      funil:     { url: gvizEsc('sheet=Esc_Funil'),     cols:['Ordem','Etapa','Grupo','Total'],         demo: DEMO_ESC.funil, valid: rows => rows.some(r => /^\d+$/.test(String(r.Ordem||'').trim())) },
      snapshots: { url: gvizEsc('sheet=Esc_Snapshots'), cols:['Data','Total','Fechadas','Perdidas'],    demo: DEMO_ESC.snapshots },
      motivos:   { url: gvizEsc('sheet=Esc_Motivos'),   cols:['Motivo','Total'],                        demo: DEMO_ESC.motivos },
    },
    render: renderEscolas,
  },
  levon: { label: 'Lévon Idiomas', placeholder: true },
};

// ── LOADER (CSV ao vivo ou demo) ─────────────────────────
function loadCsv(src) {
  return new Promise(resolve => {
    if (!src.url) { resolve(src.demo || null); return; }
    Papa.parse(src.url, {
      download: true, header: true, skipEmptyLines: true,
      complete: res => {
        const rows = res.data || [];
        const ok = rows.length > 0 && src.cols.every(c => c in rows[0]) && (!src.valid || src.valid(rows));
        resolve(ok ? rows : (src.demo || null));
      },
      error: () => resolve(src.demo || null),
    });
  });
}

async function loadAll(sources) {
  const keys = Object.keys(sources);
  const arr = await Promise.all(keys.map(k => loadCsv(sources[k])));
  const out = {}; let anyLive = false;
  keys.forEach((k, i) => {
    out[k] = arr[i];
    // marca "live" se o CSV bateu (a função acima já devolveu demo em fallback;
    // pra simplificar, marcamos demo quando o funil veio igual ao demo de referência)
  });
  out._isDemo = (JSON.stringify(out.funil) === JSON.stringify(sources.funil.demo));
  return out;
}

// ── HELPERS DE DOM ───────────────────────────────────────
function el(html) { const t = document.createElement('template'); t.innerHTML = html.trim(); return t.content.firstChild; }
function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function kpiCard(label, value, sub, color) {
  return `<div class="kpi-card" style="border-top-color:${color}">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`;
}
function chartCard(id, title, desc, full, stat) {
  const statHtml = stat ? `<div class="chart-stat"><b>${stat.value}</b><span>${stat.label}</span></div>` : '';
  return `<div class="chart-card ${full ? 'full' : ''}">
      <div class="chart-header ${stat ? 'with-stat' : ''}">
        <div><div class="chart-title">${title}</div><div class="chart-desc">${desc}</div></div>${statHtml}
      </div>
      <div class="chart-wrapper"><canvas id="${id}"></canvas></div>
    </div>`;
}
function periodBar(dataLabel, isDemo) {
  return `<div class="period-bar">
      <div class="period-label">Foto do funil em: <strong>${dataLabel || 'hoje'}</strong></div>
      ${isDemo ? '<div class="sample-tag">Dados de exemplo (planilha não conectada)</div>' : ''}
    </div>`;
}

// ── RENDER R10 (pais) ────────────────────────────────────
function renderR10(d) {
  const funil = d.funil, escolinhas = d.escolinhas || [], snapshots = d.snapshots || [], motivos = d.motivos || [];
  const total        = funil.reduce((s,r)=>s+num(r.Total),0);
  const planilha     = funil.reduce((s,r)=>s+num(r.Planilha),0);
  const trafego      = funil.reduce((s,r)=>s+num(r.Trafego),0);
  const matriculados = funil.filter(r=>r.Grupo==='Ganho').reduce((s,r)=>s+num(r.Total),0);
  const perdidos     = funil.filter(r=>r.Grupo==='Perdido').reduce((s,r)=>s+num(r.Total),0);
  const andamento    = total - matriculados - perdidos;
  const lastSnap     = snapshots[snapshots.length-1];

  const c = document.getElementById('content');
  c.innerHTML = periodBar(lastSnap ? lastSnap.Data : 'hoje', d._isDemo) +
    `<div class="kpi-grid">
      ${kpiCard('Total de Leads', fmt(total), 'no board', C.cyan)}
      ${kpiCard('Matriculados', fmt(matriculados), pct(matriculados,total)+'% de matrícula', C.verde)}
      ${kpiCard('Em Andamento', fmt(andamento), 'no meio do funil', C.azul)}
      ${kpiCard('Perdidos', fmt(perdidos), pct(perdidos,total)+'% perdidos', C.vermelho)}
      ${kpiCard('Origem (Plan./Tráf.)', pct(planilha,total)+'/'+pct(trafego,total), planilha+' planilha · '+trafego+' tráfego', C.amarelo)}
    </div>
    <div class="charts-row">
      ${chartCard('chFunil','Funil de Atendimento','Do lead novo à matrícula (foto atual)')}
      ${chartCard('chOrigem','Origem dos Leads','Planilha (escolinha) vs. Tráfego (Meta Ads)')}
    </div>
    <div class="charts-row">
      ${chartCard('chEscolinhas','Leads por Escolinha Parceira','Distribuição dos leads de planilha')}
      ${chartCard('chEvolucao','Evolução no Tempo','Snapshots do funil ao longo das datas')}
    </div>
    <div class="charts-row" style="grid-template-columns:1fr">
      ${chartCard('chMotivos','Motivos de Não Fechamento','Por que os leads em "Sem Interesse" não fecharam', true, { value: motivos.reduce((s,r)=>s+num(r.Total),0), label:'total de não fechamentos' })}
    </div>`;

  destroyCharts();
  drawFunil('chFunil', funil);
  charts.origem = new Chart(document.getElementById('chOrigem'), {
    type:'doughnut',
    data:{ labels:['Planilha (escolinha)','Tráfego (Meta Ads)'], datasets:[{ data:[planilha,trafego], backgroundColor:[C.cyan,C.amarelo], borderWidth:0, hoverOffset:10 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'66%',
      plugins:{ legend:{ position:'bottom', labels:{ font:baseFont, boxWidth:12, padding:18 } },
        tooltip:{ callbacks:{ label:ctx=>' '+ctx.label+': '+ctx.raw+' ('+pct(ctx.raw,total)+'%)' } } } }
  });
  drawBar('chEscolinhas', escolinhas.map(r=>r.Escolinha), escolinhas.map(r=>num(r.Total)), ESCOLA_CORES);
  drawEvolucao('chEvolucao', snapshots, [
    { key:'Total', color:C.azul }, { key:'Matriculados', color:C.verde }, { key:'Perdidos', color:C.vermelho }
  ]);
  drawBarH('chMotivos', motivos.map(r=>r.Motivo), motivos.map(r=>num(r.Total)), MOTIVO_CORES);
}

// ── RENDER ESCOLAS (parcerias B2B) ───────────────────────
function renderEscolas(d) {
  const funil = d.funil, snapshots = d.snapshots || [], motivos = d.motivos || [];
  const total      = funil.reduce((s,r)=>s+num(r.Total),0);
  const fechadas   = funil.filter(r=>r.Grupo==='Ganho').reduce((s,r)=>s+num(r.Total),0);
  const perdidas   = funil.filter(r=>r.Grupo==='Perdido').reduce((s,r)=>s+num(r.Total),0);
  const andamento  = total - fechadas - perdidas;
  const agendadas  = funil.filter(r=>/agendamento/i.test(r.Etapa)).reduce((s,r)=>s+num(r.Total),0);
  const lastSnap   = snapshots[snapshots.length-1];

  const c = document.getElementById('content');
  c.innerHTML = periodBar(lastSnap ? lastSnap.Data : 'hoje', d._isDemo) +
    `<div class="kpi-grid">
      ${kpiCard('Total de Escolas', fmt(total), 'no board', C.cyan)}
      ${kpiCard('Parcerias Fechadas', fmt(fechadas), pct(fechadas,total)+'% de fechamento', C.verde)}
      ${kpiCard('Em Andamento', fmt(andamento), 'no meio do funil', C.azul)}
      ${kpiCard('Sem Interesse', fmt(perdidas), pct(perdidas,total)+'% perdidas', C.vermelho)}
      ${kpiCard('Reuniões Agendadas', fmt(agendadas), 'aguardando reunião', C.amarelo)}
    </div>
    <div class="charts-row">
      ${chartCard('chEscFunil','Funil de Parceria','Da prospecção ao fechamento (foto atual)')}
      ${chartCard('chEscEvolucao','Evolução no Tempo','Snapshots do funil ao longo das datas')}
    </div>
    <div class="charts-row" style="grid-template-columns:1fr">
      ${chartCard('chEscMotivos','Motivos de Não Fechamento','Por que as escolas em "Sem Interesse" não fecharam parceria', true, { value: motivos.reduce((s,r)=>s+num(r.Total),0), label:'total de não fechamentos' })}
    </div>`;

  destroyCharts();
  drawFunil('chEscFunil', funil, (r, i) => ESC_FUNIL_COR[r.Etapa] || ESCOLA_CORES[i % ESCOLA_CORES.length]);
  drawEvolucao('chEscEvolucao', snapshots, [
    { key:'Total', color:C.azul }, { key:'Fechadas', color:C.verde }, { key:'Perdidas', color:C.vermelho }
  ]);
  drawBarH('chEscMotivos', motivos.map(r=>r.Motivo), motivos.map(r=>num(r.Total)), MOTIVO_CORES);
}

// ── PRIMITIVAS DE GRÁFICO ────────────────────────────────
function drawFunil(canvasId, funil, colorFn) {
  const etapas = funil.filter(r=>r.Grupo!=='Perdido').sort((a,b)=>num(a.Ordem)-num(b.Ordem));
  const cor = colorFn || ((_, i) => FUNIL_CORES[i % FUNIL_CORES.length]);
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels: etapas.map(r=>r.Etapa), datasets:[{ data: etapas.map(r=>num(r.Total)),
      backgroundColor: etapas.map((r,i)=>cor(r,i)), borderRadius:6, borderSkipped:false }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx=>' '+ctx.raw } } },
      scales:{ x:{ grid:{ color:gridColor }, ticks:{ font:baseFont, precision:0 }, beginAtZero:true },
        y:{ grid:{ display:false }, ticks:{ font:{ ...baseFont, weight:'600' } } } } }
  });
}
function drawBar(canvasId, labels, data, cores) {
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor: labels.map((_,i)=>cores[i%cores.length]), borderRadius:6, borderSkipped:false }] },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false }, tooltip:{ callbacks:{ label:ctx=>' '+ctx.raw } } },
      scales:{ x:{ grid:{ display:false }, ticks:{ font:baseFont } },
        y:{ grid:{ color:gridColor }, ticks:{ font:baseFont, precision:0 }, beginAtZero:true } } }
  });
}
function drawBarH(canvasId, labels, data, cores) {
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'bar',
    data:{ labels, datasets:[{ data, backgroundColor: labels.map((_,i)=>cores[i%cores.length]), borderRadius:6, borderSkipped:false }] },
    options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false,

function drawEvolucao(canvasId, snapshots, series) {
  const labels = snapshots.map(s=>s.Data);
  charts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'line',
    data:{ labels, datasets: series.map(s=>({
      label:s.key, data: snapshots.map(r=>num(r[s.key])), borderColor:s.color, backgroundColor:s.color+'18',
      tension:0.35, fill:false, borderWidth:2, pointRadius:5, pointBackgroundColor:s.color })) },
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom', labels:{ font:{ ...baseFont, size:11 }, boxWidth:10, padding:16 } } },
      scales:{ x:{ grid:{ color:gridColor }, ticks:{ font:baseFont } },
        y:{ grid:{ color:gridColor }, ticks:{ font:baseFont, precision:0 }, beginAtZero:true } } }
  });
}

// ── PLACEHOLDER ──────────────────────────────────────────
function renderPlaceholder(label) {
  document.getElementById('content').innerHTML =
    `<div class="placeholder">
      <h2>${label} — em breve</h2>
      <p>Esta pipeline ainda não foi montada no Trello. Quando o board e os leads existirem,
      o robô passa a abastecer as abas <code>Lev_*</code> da planilha e este painel acende sozinho.</p>
    </div>`;
}

// ── NAVEGAÇÃO ────────────────────────────────────────────
async function selectTab(key) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key === key));
  const p = PIPELINES[key];
  destroyCharts();
  if (p.placeholder) { renderPlaceholder(p.label); return; }
  document.getElementById('content').innerHTML = '<div class="period-bar"><div class="period-label">Carregando…</div></div>';
  const data = await loadAll(p.sources);
  p.render(data);
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => selectTab(t.dataset.key)));
window.addEventListener('DOMContentLoaded', () => selectTab('escolas'));
</script>
